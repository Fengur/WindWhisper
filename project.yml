name: WindWhisper
options:
  bundleIdPrefix: com.fengur
  deploymentTarget:
    macOS: "13.0"

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit
    from: "5.7.0"

targets:
  WindWhisper:
    type: application
    platform: macOS
    dependencies:
      - package: SnapKit
      - framework: Libraries/sherpa-onnx.xcframework
        embed: false
    sources:
      - path: WindWhisper
        excludes:
          - "Resources/sensevoice"
          - "Resources/paraformer-streaming"
      - path: WindWhisper/Resources/sensevoice
        type: folder
        buildPhase: resources
      - path: WindWhisper/Resources/paraformer-streaming
        type: folder
        buildPhase: resources
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: WindWhisper-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(PROJECT_DIR)/Libraries
          - $(PROJECT_DIR)/Libraries/sherpa-onnx.xcframework/macos-arm64_x86_64/Headers
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/Libraries
        OTHER_LDFLAGS:
          - -lmicvol
          - -lwhisper
          - -lggml
          - -lggml-base
          - -lggml-cpu
          - -lggml-blas
          - -lggml-metal
          - -lonnxruntime
          - -framework CoreAudio
          - -framework AudioToolbox
          - -framework CoreFoundation
          - -framework AVFoundation
          - -framework Carbon
          - -framework Metal
          - -framework MetalKit
          - -framework Accelerate
          - -framework CoreML
          - -lstdc++
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.fengur.WindWhisper
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "WindWhisper needs microphone access for voice input."
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_CFBundleIconFile: AppIcon
